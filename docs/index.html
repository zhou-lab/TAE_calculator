<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TAE Calculator</title>
    <script
      src="./shinylive/load-shinylive-sw.js"
      type="module"
    ></script>
    <script type="module">
      import { runExportedApp } from "./shinylive/shinylive.js";
      runExportedApp({
        id: "root",
        appEngine: "r",
        relPath: "",
      });
    </script>
    <link rel="stylesheet" href="./shinylive/style-resets.css" />
    <link rel="stylesheet" href="./shinylive/shinylive.css" />
    
  </head>
  <body>
    
    <div id="loading-msg" style="
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      font-family: Arial, sans-serif; background: #f5f6fa; z-index: 9999;">
      <div style="font-size: 1.3em; font-weight: bold; color: #2c7be5; margin-bottom: 10px;">
        TAE Calculator
      </div>
      <div style="color: #555; margin-bottom: 18px;">
        Loading R engine — first visit only, please wait…
      </div>
      <div style="width: 220px; height: 6px; background: #dde; border-radius: 3px; overflow: hidden;">
        <div style="width: 40%; height: 100%; background: #2c7be5; border-radius: 3px;
                    animation: bar 1.4s ease-in-out infinite alternate;">
        </div>
      </div>
      <style>
        @keyframes bar { from { margin-left: 0 } to { margin-left: 60% } }
      </style>
    </div>
    <script>
      document.addEventListener("DOMContentLoaded", function() {
        var root = document.getElementById("root");
        var msg  = document.getElementById("loading-msg");
        new MutationObserver(function(mutations, outerObs) {
          var iframe = root.querySelector("iframe");
          if (!iframe) return;
          outerObs.disconnect();

          // Inject CSS to hide shinylive's honeycomb inside the iframe
          function injectHide(doc) {
            if (!doc || !doc.head) return;
            var s = doc.createElement("style");
            s.textContent = ".loading-animation { display: none !important; }";
            doc.head.appendChild(s);
          }

          function setupInnerWatch() {
            var doc = iframe.contentDocument || iframe.contentWindow.document;
            injectHide(doc);
            // Watch inside iframe for Shiny being ready
            new MutationObserver(function(m, innerObs) {
              if (doc.querySelector(".shiny-input-container, .shiny-bound-output")) {
                msg.style.display = "none";
                innerObs.disconnect();
              }
            }).observe(doc.documentElement, { childList: true, subtree: true });
          }

          if (iframe.contentDocument && iframe.contentDocument.readyState !== "loading") {
            setupInnerWatch();
          } else {
            iframe.addEventListener("load", setupInnerWatch);
          }
        }).observe(root, { childList: true, subtree: true });
      });
    </script>
    <div style="height: 100vh; width: 100vw" id="root"></div>
    
  </body>
</html>
